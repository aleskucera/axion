# @package engine
_target_: axion.AxionEngineConfig
max_newton_iters: 16
max_linear_iters: 16
backtrack_min_iter: 2
newton_atol: 1e-3
linear_atol: 1e-3
linear_tol: 1e-3
enable_linesearch: false 
linesearch_conservative_step_count: 16
linesearch_conservative_upper_bound: 0.8
linesearch_min_step: 1e-6
linesearch_optimistic_step_count: 48
linesearch_optimistic_window: 0.4
joint_compliance: 6e-10
contact_compliance: 1e-10
friction_compliance: 1e-6
regularization: 1e-6
contact_fb_alpha: 0.5
contact_fb_beta: 1.0
friction_fb_alpha: 1.0
friction_fb_beta: 1.0
max_contacts_per_world: 256
enable_contact_warm_start: true
contact_reduction:
  policy: cluster
  max_per_pair: 6
differentiable_simulation: false
