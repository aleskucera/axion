defaults:
  - simulation: helhest
  - rendering: headless
  - logging: hdf5
  - engine: axion
  - control: helhest/velocity
  - _self_

project_name: ${hydra:job.name}

friction_coeff: 0.5

drive_velocity: 6.0

# Capture per-step PCR + decomposition data for the dashboard / analysis.
logging:
  hdf5:
    enabled: true
    file: "data/logs/${project_name}.h5"

