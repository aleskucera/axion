env:
  env_name: Pendulum
  num_envs: 512
  utils_provider_cfg:
    name: TransformerNeuralModelUtilsProvider
    states_frame: body
    anchor_frame_step: every
    states_embedding_type: identical
    state_prediction_type: relative
    lambda_prediction_type: relative
    prediction_quantity_type: full_state
    num_states_history: 10

algorithm:
  name: MTLTrainer # informational only; trainer class comes from train_mtl.py
  use_energy_loss: false # currently unused in MTLTrainer
  num_epochs: 10
  num_iters_per_epoch: -1
  sample_sequence_length: 10
  batch_size: 256
  num_valid_batches: 256
  truncate_grad: true
  grad_norm: 1.0
  eval_interval: 0 # disables rollout eval during training
  loss:
    regression_loss_weight: 1.0
    classification_loss_weight: 1.0
    classification_num_classes: 2
    classification_eps: 1.0e-8
    classification_prob_threshold: 0.5
    positive_class_weight: 1.0

  optimizer:
    name: adamw
    lr_start: 5e-3
    lr_end: 1e-4
    lr_schedule: cosine
    weight_decay: 8e-4

  dataset:
    train_dataset_path: [src/axion/neural_solver/datasets/Pendulum/pendulumTrainMtlNoContacts2000len500envs2seed0LabelsTh05.hdf5]
    valid_datasets:
      valid: src/axion/neural_solver/datasets/Pendulum/pendulumValMtlNoContacts2000len500envs2seed1LabelsTh05.hdf5
    max_capacity: 100000000
    num_data_workers: 4

  eval:
    mode: dataset # inactive when eval_interval=0
    rollout_horizon: 10 # inactive when eval_interval=0
    num_rollouts: 20000 # inactive when eval_interval=0
    dataset_path: src/axion/neural_solver/datasets/Pendulum/pendulumValMtlNoContacts2000len500envs2seed1LabelsTh05.hdf5 # inactive when eval_interval=0
    passive: true # inactive when eval_interval=0

inputs:
  low_dim: [
    states_embedding,
    contact_normals,
    contact_points_1,
    contact_depths,
    gravity_dir
  ]

network:
  model_impl: mtl
  normalize_input: true
  normalize_output: false
  enable_state_head: true
  enable_lambda_head: true

  encoder:
    low_dim:
      layer_sizes: []
      activation: relu
      layernorm: false

  transformer:
    block_size: 16
    n_layer: 6
    n_head: 12
    n_embd: 192
    dropout: 0.0
    bias: false
