env:
  env_name: Pendulum
  num_envs: 512
  utils_provider_cfg:
    name: TransformerNeuralModelUtilsProvider
    states_frame: body
    anchor_frame_step: every # not actively used in current residual-only vel+lambda trainer path
    states_embedding_type: identical
    state_prediction_type: relative
    lambda_prediction_type: absolute
    prediction_quantity_type: full_state # has to be full state!
    num_states_history: 10

algorithm:
  name: VelAndLambdaTrainer # informational only; trainer class is selected by train_vel_and_lambda_network.py, not by this field
  use_energy_loss: false # legacy flag, not used in current residual-only vel+lambda trainer
  num_epochs: 2
  num_iters_per_epoch: -1
  sample_sequence_length: 10
  batch_size: 256
  num_valid_batches: 256
  truncate_grad: true
  grad_norm: 1.0
  eval_interval: 0
  loss:
    residual_loss_weight: 1.0
    supervised_loss_weight: 1.0 # scales any enabled supervised next-step MSE terms
    use_supervised_loss_state: true # adds MSE against HDF5 data/next_states when true
    use_supervised_loss_lambdas: false # adds MSE against HDF5 data/next_lambdas when true
    disable_rollout_eval: true

  optimizer:
    name: adamw
    lr_start: 5e-3
    lr_end: 1e-4
    lr_schedule: cosine
    weight_decay: 8e-4

  dataset:
    train_dataset_path: src/axion/neural_solver/datasets/Pendulum/pendulumTrainVelLambda200klen400envs250seed0.hdf5
    valid_datasets:
      valid: src/axion/neural_solver/datasets/Pendulum/pendulumValidVelLambda200klen400envs250seed1.hdf5
    max_capacity: 100000000
    num_data_workers: 4

  eval:
    mode: dataset # currently inactive because eval_interval=0 (rollout eval disabled)
    rollout_horizon: 10 # currently inactive because eval_interval=0 (rollout eval disabled)
    num_rollouts: 20000 # currently inactive because eval_interval=0 (rollout eval disabled)
    dataset_path: src/axion/neural_solver/datasets/Pendulum/pendulumValidVelLambda200klen400envs250seed1.hdf5 # currently inactive because eval_interval=0 (rollout eval disabled)
    passive: true # currently inactive because eval_interval=0 (rollout eval disabled)

inputs:
  low_dim:
    [
      states_embedding,
      contact_normals,
      contact_points_1,
      contact_depths,
      gravity_dir,
    ]

network:
  model_impl: vel_and_lambda
  normalize_input: true
  normalize_output: false
  enable_state_head: true
  enable_lambda_head: true

  encoder:
    low_dim:
      layer_sizes: []
      activation: relu
      layernorm: false

  transformer:
    block_size: 16
    n_layer: 6
    n_head: 12
    n_embd: 192
    dropout: 0.0
    bias: false