env:
  env_name: Pendulum
  num_envs: 512
  utils_provider_cfg: 
    name: TransformerNeuralModelUtilsProvider
    states_frame: body
    anchor_frame_step: every
    states_embedding_type: identical
    state_prediction_type: relative
    lambda_prediction_type: relative
    prediction_quantity_type: full_state # full_state
    num_states_history: 10     # number of states and actions to pass into model. Default: 1 means use current state and action
  
algorithm:
  name: SequenceModelTrainer
  use_energy_loss: false
  lambda_loss_weight: 1.0
  num_epochs: 20
  num_iters_per_epoch: -1  # 976 x 1024 = 999 424 (1 M)
  sample_sequence_length: 10 # the length to sample sequence from dataset
  batch_size: 1024
  num_valid_batches: 256 # what portion of validation dataset to validate on (num_valid_batches * batch_size)
  truncate_grad: True
  grad_norm: 1.0
  loss:
    huber_delta: 1.0
    lambda_loss_type: mse  # mse | l1 | huber
    kinematics_loss_weight: 0.5

  optimizer:
    name: adamw   # adam | adamw
    lr_start: 5e-3
    lr_end: 1e-4
    lr_schedule: cosine
    weight_decay: 8e-4 # 0.0 was default for adam

  dataset:
    # Single dataset: train_dataset_path: path/to/one.hdf5
    # Multiple datasets (e.g. len 500 + len 2000): list of paths
    #train_dataset_path: src/axion/neural_solver/datasets/Pendulum/pendulumContactsValid1Mlen2000envs250seed1.hdf5
    train_dataset_path: [src/axion/neural_solver/datasets/Pendulum/pendulumContactsValid250klen500envs250seed1.hdf5]
    valid_datasets: 
      valid: src/axion/neural_solver/datasets/Pendulum/pendulumContactsValid250klen500envs250seed1.hdf5
      #exp_trajectory: PATH/TO/VALID_DATASET_1.hdf5
      #fixed_ground_passive: PATH/TO/VALID_DATASET_2.hdf5
    max_capacity: 100000000
    num_data_workers: 4
  
  eval:
    mode: dataset
    rollout_horizon: 10
    num_rollouts: 20000
    dataset_path: src/axion/neural_solver/datasets/Pendulum/pendulumContactsValid250klen500envs250seed1.hdf5
    passive: True

inputs:
  low_dim: [
    states_embedding,
    lambdas,
    contact_normals,
    contact_points_1,
    contact_depths,
    gravity_dir
  ]
  
network:
  normalize_input: True
  normalize_output: True
  enable_state_head: False   
  enable_lambda_head: True
  
  encoder:
    low_dim:
      layer_sizes: []
      activation: relu
      layernorm: False

  transformer:
    block_size: 16
    n_layer: 6       # number of transformer blocks
    n_head: 12        # num transformer heads
    n_embd: 192       # size of input embedding
    dropout: 0.0      # for pretraining 0 is good, for finetuning try 0.1+
    bias: False       # do we use bias inside LayerNorm and Linear layers?

  model:
    output_tanh: False
    mlp: 
      layer_sizes: [64]
      activation: relu
      layernorm: False

  lambda_model:
    # Residual into lambda head only: lambda_in = transformer_out + Linear(concat(all inputs.low_dim)).
    state_skip: false
    output_tanh: False
    mlp:
      layer_sizes: [256]
      activation: relu
      layernorm: False